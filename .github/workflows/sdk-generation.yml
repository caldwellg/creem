name: Speakeasy SDK Generation

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "packages/creem-sdk/openapi.json"
      - "packages/creem-sdk/.speakeasy/**"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      speakeasy_version: latest
      working_directory: packages/creem-sdk
      mode: pr
      # Speakeasy's compile step runs `npm install`, which collides with this
      # repo's pnpm-managed node_modules and corrupts esbuild's binary. The
      # monorepo's own `pnpm turbo build` covers compile/typecheck.
      skip_compile: true
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
